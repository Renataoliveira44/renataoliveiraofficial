<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renata Oliveira | Travel & Beauty Influencer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS RESET & BASE --- */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            color: #333;
            background-color: #fff;
            line-height: 1.6;
        }
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        a:hover { opacity: 0.7; }
        ul { list-style: none; padding: 0; margin: 0; }

        /* --- 1. TOP UTILITY BAR --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 50px;
            font-size: 11px;
            letter-spacing: 2px;
            border-bottom: 1px solid #f2f2f2;
            text-transform: uppercase;
        }
        .top-nav a { margin-right: 25px; }
        .top-socials span { margin-left: 15px; cursor: pointer; font-size: 14px; }

        /* --- 2. SITE HEADER (LOGO) --- */
        .site-header {
            padding: 60px 0;
            text-align: center;
        }
        .site-title {
            font-family: 'Playfair Display', serif;
            font-size: 54px;
            font-weight: 400;
            letter-spacing: 12px;
            margin: 0;
            text-transform: uppercase;
        }

        /* --- 3. MAIN NAVIGATION --- */
        .main-nav {
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 18px 0;
            text-align: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }
        .main-nav li { display: inline-block; margin: 0 22px; }
        .main-nav a { font-size: 12px; letter-spacing: 2.5px; font-weight: 400; }

        /* --- 4. HERO SECTION --- */
        .hero {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .hero-container {
            position: relative;
            width: 100%;
            height: 650px;
            background-image: url('https://images.unsplash.com/photo-1515871204537-49a5fe66a31f?q=80&w=2000'); /* Placeholder: Snow/Winter Scene */
            background-size: cover;
            background-position: center;
        }
        .hero-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            text-align: center;
            width: 90%;
            max-width: 550px;
            border: 1px solid #ddd;
        }
        .card-cat { font-size: 11px; letter-spacing: 4px; display: block; margin-bottom: 8px; color: #999; }
        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            line-height: 1.3;
            margin: 10px 0 20px;
            font-weight: 400;
        }
        .btn-read {
            font-size: 11px;
            letter-spacing: 3px;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
            font-weight: 600;
        }

        /* --- 5. CATEGORY GRID (3 IMAGES) --- */
        .category-grid {
            display: flex;
            justify-content: space-between;
            padding: 0 40px 60px;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .cat-item {
            flex: 1;
            height: 380px;
            position: relative;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            overflow: hidden;
        }
        /* Style placeholders - replace with your travel/makeup photos */
        .cat-style { background-image: url('https://images.unsplash.com/photo-1581044777550-4cfa60707c03?q=80&w=800'); }
        .cat-travel { background-image: url('https://images.unsplash.com/photo-1528127269322-539801943592?q=80&w=800'); }
        .cat-living { background-image: url('https://images.unsplash.com/photo-1513519245088-0e12902e5a38?q=80&w=800'); }

        .cat-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 35px;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }
        .cat-item:hover .cat-overlay { background: #fff; letter-spacing: 6px; }

        /* --- 6. "CURRENTLY LOVING" HEADER --- */
        .currently-loving-section {
            padding: 40px 40px 80px;
            max-width: 1400px;
            margin: 0 auto;
            text-align: center;
        }
        .line-header {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .line {
            flex: 1;
            height: 1px;
            background: #000;
        }
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 400;
            margin: 0 40px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 850px) {
            .category-grid { flex-direction: column; }
            .top-bar, .main-nav li { display: none; } /* Simplified for mobile view */
            .site-title { font-size: 32px; letter-spacing: 5px; }
            .hero-container { height: 450px; }
            .hero-card { padding: 30px 20px; }
            .hero-title { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <nav class="top-nav">
            <a href="#">Style</a>
            <a href="#">Living</a>
            <a href="#">Travel</a>
            <a href="#">Beauty</a>
        </nav>
        <div class="top-socials">
            <span>Instagram</span> <span>TikTok</span> <span>Pinterest</span>
        </div>
    </div>

    <header class="site-header">
        <h1 class="site-title">Renata Oliveira</h1>
    </header>

    <nav class="main-nav">
        <ul>
            <li><a href="#">HOME</a></li>
            <li><a href="#">AFRICA</a></li>
            <li><a href="#">AMERICAS</a></li>
            <li><a href="#">ASIA</a></li>
            <li><a href="#">EUROPE</a></li>
            <li><a href="#">CONTACT</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="hero-container">
            <div class="hero-card">
                <span class="card-cat">TRAVEL</span>
                <span class="card-cat" style="font-size: 9px; font-style: italic; letter-spacing: 2px;">SPRING · STYLE</span>
                <h2 class="hero-title">4-Day London Itinerary & Packing Guide</h2>
                <a href="#" class="btn-read">READ MORE</a>
            </div>
        </div>
    </main>

    <section class="category-grid">
        <div class="cat-item cat-style">
            <div class="cat-overlay">STYLE</div>
        </div>
        <div class="cat-item cat-travel">
            <div class="cat-overlay">TRAVEL</div>
        </div>
        <div class="cat-item cat-living">
            <div class="cat-overlay">LIVING</div>
        </div>
    </section>

    <section class="currently-loving-section">
        <div class="line-header">
            <span class="line"></span>
            <h2 class="header-title">Currently Loving</h2>
            <span class="line"></span>
        </div>
        </section>

</body>
</html>
