<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations | Renata Oliveira</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- GLOBAL STYLES --- */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background: #fff; color: #333; line-height: 1.8; }
        a { text-decoration: none; color: inherit; transition: 0.3s; cursor: pointer; }
        a:hover { opacity: 0.8; }

        /* --- WRAPPER FOR SIDEBAR + MAP ONLY --- */
        .top-content-wrapper {
            display: grid;
            grid-template-columns: 320px 1fr;
            max-width: 1600px;
            margin: 40px auto;
            gap: 50px;
            padding: 0 40px;
        }

        /* --- SIDEBAR & ACCORDION --- */
        .sidebar { border-right: 1px solid #f2f2f2; padding-right: 20px; }
        .sidebar-header { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #999; margin-bottom: 30px; font-weight: 600; }
        
        .continent-group { margin-bottom: 5px; }
        .continent-toggle { 
            display: flex; align-items: center; padding: 15px 0; font-size: 11px;
            letter-spacing: 2.5px; text-transform: uppercase; color: #666;
            cursor: pointer; border-bottom: 1px solid #fafafa;
        }
        .continent-num { color: #ddd; margin-right: 15px; width: 20px; font-weight: 300; }
        .continent-toggle i { font-size: 9px; margin-right: 15px; color: #cdc1b4; transition: 0.3s; }
        
        .country-list { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; list-style: none; padding-left: 55px; }
        .country-list li { padding: 8px 0; }
        .country-list li a { font-size: 10.5px; letter-spacing: 2px; text-transform: uppercase; color: #999; }

        .active .country-list { max-height: 800px; }
        .active .continent-toggle i { transform: rotate(45deg); color: #000; }

        /* --- MAP CONTROLS & WRAPPER --- */
        .map-top-controls { display: flex; gap: 20px; margin-bottom: 40px; align-items: center; }
        .search-bar { flex: 2; display: flex; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .search-bar input { border: none; width: 100%; outline: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #333; }

        .map-wrapper { 
            position: relative; width: 100%; height: 600px; 
            background: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg') no-repeat center/contain;
            opacity: 0.7;
        }
        .map-card { position: absolute; text-align: center; width: 150px; }
        .map-card img { width: 100%; height: 140px; object-fit: cover; border: 8px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .map-card span { display: block; margin-top: 10px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #999; }

        /* --- FULL WIDTH POPULAR SECTION --- */
        .popular-destinations { 
            width: 100%; 
            background-color: #fff;
            padding: 100px 60px; 
            border-top: 1px solid #f2f2f2;
            margin-top: 60px;
        }
        .popular-inner {
            max-width: 1400px; /* Wider for full effect */
            margin: 0 auto;
        }
        .popular-header { text-align: center; margin-bottom: 60px; }
        .popular-header h3 { font-family: 'Playfair Display', serif; font-size: 18px; letter-spacing: 5px; text-transform: uppercase; color: #999; font-weight: 400; }
        
        .popular-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 50px; 
        }
        .popular-card { background: #fff; padding: 20px; border: 1px solid #f2f2f2; text-align: center; }
        .popular-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        
        .popular-label { 
            background: #cdc1b4; color: #fff; padding: 14px 0; width: 85%; margin: -28px auto 0; 
            position: relative; z-index: 5; font-size: 11px; letter-spacing: 3px; 
            text-transform: uppercase; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .popular-card::after { content: "✧"; display: block; margin-top: 15px; color: #cdc1b4; font-size: 14px; opacity: 0.7; }

        @media (max-width: 1024px) {
            .top-content-wrapper { grid-template-columns: 1fr; }
            .sidebar { border: none; padding: 0; }
            .popular-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="top-content-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">Click to Expand</div>
            
            <div class="continent-group">
                <div class="continent-toggle" onclick="toggleContinent(this)">
                    <span class="continent-num">1</span> <i class="fas fa-plus"></i> Africa
                </div>
                <ul class="country-list">
                    <li><a href="morocco.html">Morocco</a></li>
                    <li><a href="egypt.html">Egypt</a></li>
                    <li><a href="kenya.html">Kenya</a></li>
                </ul>
            </div>

            <div class="continent-group">
                <div class="continent-toggle" onclick="toggleContinent(this)">
                    <span class="continent-num">2</span> <i class="fas fa-plus"></i> Asia
                </div>
                <ul class="country-list">
                    <li><a href="./china.html">China</a></li>
                    <li><a href="./vietnam-guide.html">Vietnam</a></li>
                    <li><a href="./singapore.html">Singapore</a></li>
                </ul>
            </div>
            
            <div class="continent-toggle"><span class="continent-num">3</span> <i class="fas fa-plus"></i> The Caribbean</div>
            <div class="continent-toggle"><span class="continent-num">4</span> <i class="fas fa-plus"></i> Central America</div>
            <div class="continent-toggle"><span class="continent-num">5</span> <i class="fas fa-plus"></i> Europe</div>
            <div class="continent-toggle"><span class="continent-num">6</span> <i class="fas fa-plus"></i> Middle East</div>
            <div class="continent-toggle"><span class="continent-num">7</span> <i class="fas fa-plus"></i> North America</div>
            <div class="continent-toggle"><span class="continent-num">8</span> <i class="fas fa-plus"></i> Oceania</div>
            <div class="continent-toggle"><span class="continent-num">9</span> <i class="fas fa-plus"></i> South America</div>
        </aside>

        <main class="map-area">
            <div class="map-top-controls">
                <div class="search-bar">
                    <input type="text" placeholder="Search the site...">
                    <i class="fas fa-search"></i>
                </div>
            </div>

            <div class="map-wrapper">
                <div class="map-card" style="top:22%; left:18%;">
                    <img src="https://images.unsplash.com/photo-1449034446853-66c86144b0ad?q=80&w=300">
                    <span>North America</span>
                </div>
                <div class="map-card" style="top:60%; left:50%;">
                    <img src="https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?q=80&w=300">
                    <span>Africa</span>
                </div>
            </div>
        </main>
    </div>

    <section class="popular-destinations">
        <div class="popular-inner">
            <div class="popular-header">
                <h3>Browse by Popular Destinations</h3>
            </div>
            
            <div class="popular-grid">
                <a href="greece.html" class="popular-card">
                    <img src="./greece.jpg">
                    <div class="popular-label">Greece</div>
                </a>

                <a href="./thailand-guide.html" class="popular-card">
                    <img src="./thailand.jpg">
                    <div class="popular-label">Thailand</div>
                </a>

                <a href="italy.html" class="popular-card">
                    <img src="./rome.JPG">
                    <div class="popular-label">Italy</div>
                </a>

                <a href="china-guide.html" class="popular-card">
                    <img src="https://images.unsplash.com/photo-1508804185872-d7badad00f7d?q=80&w=500">
                    <div class="popular-label">China</div>
                </a>

                <a href="vietnam-guide.html" class="popular-card">
                    <img src="https://images.unsplash.com/photo-1528127269322-539801943592?q=80&w=500">
                    <div class="popular-label">Vietnam</div>
                </a>

                <a href="morocco.html" class="popular-card">
                    <img src="./dubai.JPG">
                    <div class="popular-label">Dubai</div>
                </a>
            </div>
        </div>
    </section>

    <script>
        function toggleContinent(element) {
            const group = element.parentElement;
            document.querySelectorAll('.continent-group').forEach(other => {
                if (other !== group) other.classList.remove('active');
            });
            group.classList.toggle('active');
        }
    </script>

</body>
</html>
